version: '3.9'

services:
  postgres:
    image: postgis/postgis:15-3.3
    container_name: simgp_postgres_prod
    restart: always
    environment:
      POSTGRES_DB:       ${DB_NAME}
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    networks: [simgp_net]
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 15s
      timeout:  5s
      retries:  5

  redis:
    image: redis:7-alpine
    container_name: simgp_redis_prod
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_prod_data:/data
    networks: [simgp_net]

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.prod
    container_name: simgp_backend_prod
    restart: always
    env_file: ../.env.production
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks: [simgp_net]
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  nginx:
    image: nginx:alpine
    container_name: simgp_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ../frontend:/usr/share/nginx/html:ro
      - ./ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on: [backend]
    networks: [simgp_net]

volumes:
  postgres_prod_data:
  redis_prod_data:
  nginx_logs:

networks:
  simgp_net:
    driver: bridge
