name: SIMGP-Táchira CI/CD

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── 1. Tests ──────────────────────────────────────────────
  test:
    name: Tests Automáticos
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:15-3.3
        env:
          POSTGRES_DB:       simgp_test
          POSTGRES_USER:     simgp_test
          POSTGRES_PASSWORD: simgp_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar migraciones de test
        env:
          DB_HOST:     localhost
          DB_PORT:     5432
          DB_NAME:     simgp_test
          DB_USER:     simgp_test
          DB_PASSWORD: simgp_test
          NODE_ENV:    test
        run: npm run migrate

      - name: Ejecutar tests
        env:
          DB_HOST:     localhost
          DB_PORT:     5432
          DB_NAME:     simgp_test
          DB_USER:     simgp_test
          DB_PASSWORD: simgp_test
          REDIS_HOST:  localhost
          NODE_ENV:    test
          ANTHROPIC_API_KEY: ''
          OPENAI_API_KEY:    ''
        run: npm test

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  # ── 2. Build Docker ───────────────────────────────────────
  build:
    name: Build & Push imagen Docker
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login al GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extraer metadata Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build y push
        uses: docker/build-push-action@v5
        with:
          context:    .
          file:       ./docker/Dockerfile.prod
          push:       true
          tags:       ${{ steps.meta.outputs.tags }}
          labels:     ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── 3. Deploy Railway (backend) ───────────────────────────
  deploy-backend:
    name: Deploy Backend → Railway
    needs: build
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy a Railway
        uses: bervProject/railway-deploy@main
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service:       simgp-backend

  # ── 4. Deploy Vercel (frontend) ───────────────────────────
  deploy-frontend:
    name: Deploy Frontend → Vercel
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy a Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token:   ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id:  ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args:    '--prod'
